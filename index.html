<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>can I see the sun smiling ☀️</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #fff3d6, #ffd6e7);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Main Card */
.card {
  width: 540px;
  height: 420px;
  background: #ffffff;
  border-radius: 28px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.18);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
  text-align: center;
  padding: 25px;
}

/* Question */
h2 {
  font-size: 22px;
  color: #444;
  margin-bottom: 25px;
}

/* Button Area */
.buttons {
  position: relative;
  width: 100%;
  height: 180px;
}

/* Buttons */
button {
  border: none;
  padding: 14px 22px;
  border-radius: 26px;
  cursor: pointer;
  font-size: 15px;
  transition: all 0.25s ease;
}

/* Yes Button */
#yesBtn {
  background: #ff7aa2;
  color: white;
  position: relative;
}

/* No Button */
#noBtn {
  background: #e0e0e0;
  position: absolute;
  top: 80px;
  left: 320px;
  transition: all 0.15s ease;
}

/* Final Scene */
.final {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  animation: fadeIn 0.5s ease forwards;
}

.final h1 {
  color: #ff7aa2;
  font-size: 26px;
  margin: 0;
}

.final img {
  width: 320px;
  border-radius: 18px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.15);
}

/* Fade in */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="card">

  <h2 id="question">do you want to continue?</h2>

  <div class="buttons">
    <button id="yesBtn" onclick="yesClick()">Yes</button>
    <button id="noBtn"
      onmouseover="runAway()"
      onclick="runAway()">
      No
    </button>
  </div>

  <div class="final" id="final">
    <h1>can I see the sun smiling ☀️</h1>
    <img src="https://media.giphy.com/media/FZuC4kSIAe7MTXyHuJ/giphy.gif">
  </div>

</div>

<script>
let yesStage = 0;

const yesTexts = [
  "Yes",
  "Definitely Yes",
  "100% Yes",
  "Of course Yes"
];

function runAway() {
  const noBtn = document.getElementById("noBtn");

  const x = Math.random() * 360;
  const y = Math.random() * 150;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

function yesClick() {
  const yesBtn = document.getElementById("yesBtn");

  yesStage++;

  if (yesStage < yesTexts.length) {
    yesBtn.innerText = yesTexts[yesStage];
    yesBtn.style.transform = "scale(" + (1 + yesStage * 0.2) + ")";
  } else {
    document.querySelector(".buttons").style.display = "none";
    document.getElementById("question").style.display = "none";
    document.getElementById("final").style.display = "flex";
  }
}
</script>

</body>
</html>
