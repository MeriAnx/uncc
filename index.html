<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>can I see the sun smiling ☀️</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #fff3d6, #ffd6e7);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 560px;
  height: 420px;
  background: white;
  border-radius: 28px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.18);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
  text-align: center;
}

h2 {
  font-size: 22px;
  color: #444;
  margin-bottom: 40px;
}

/* BUTTON AREA */
.area {
  width: 100%;
  height: 220px;
  position: relative;
}

/* YES (centered, static until triggered) */
#yesBtn {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) scale(1);
  background: #ff7aa2;
  color: white;
  border: none;
  padding: 14px 22px;
  border-radius: 26px;
  cursor: pointer;
  transition: transform 0.5s ease;
}

/* NO (starts next to yes, static) */
#noBtn {
  position: absolute;
  left: calc(50% + 90px);
  top: 50%;
  transform: translate(-50%, -50%);
  background: #e0e0e0;
  border: none;
  padding: 14px 22px;
  border-radius: 26px;
  cursor: pointer;
  transition: all 0.25s ease;
}

/* FINAL */
.final {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 15px;
}

.final h1 {
  color: #ff7aa2;
  font-size: 26px;
}

.final img {
  width: 320px;
  border-radius: 18px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<div class="card">

  <h2 id="question">do you want to continue?</h2>

  <div class="area">
    <button id="yesBtn">Yes</button>
    <button id="noBtn">No</button>
  </div>

  <div class="final" id="final">
    <h1>can I see the sun smiling ☀️</h1>
    <img src="https://media.giphy.com/media/FZuC4kSIAe7MTXyHuJ/giphy.gif">
  </div>

</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const area = document.querySelector(".area");
const question = document.getElementById("question");
const final = document.getElementById("final");

let started = false;
let yesScale = 1;
let yesStage = 0;

const yesTexts = [
  "Yes",
  "Definitely Yes",
  "100% Yes",
  "Of course Yes"
];

/* ONLY START INTERACTION ON FIRST HOVER */
noBtn.addEventListener("mouseenter", startGame);

function startGame() {
  if (started) return;
  started = true;

  /* YES starts growing slowly */
  setInterval(() => {
    yesScale += 0.03;
    yesBtn.style.transform = `translate(-50%, -50%) scale(${yesScale})`;
  }, 900);

  /* enable runaway behaviour */
  noBtn.addEventListener("mouseenter", runAway);
}

/* smooth escape movement */
function runAway() {
  const maxX = area.clientWidth - 120;
  const maxY = area.clientHeight - 80;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
  noBtn.style.transform = "scale(0.6)";
}

/* YES progression */
yesBtn.addEventListener("click", () => {
  yesStage++;

  if (yesStage < yesTexts.length) {
    yesBtn.innerText = yesTexts[yesStage];
  } else {
    document.querySelector(".area").style.display = "none";
    question.style.display = "none";
    final.style.display = "flex";
  }
});
</script>

</body>
</html>
