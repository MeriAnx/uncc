<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>can I see the sun smiling ☀️</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #fff5dd, #ffd6e7);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* main card */
.card {
  width: 560px;
  height: 380px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  border-radius: 28px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.15);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
}

/* title */
h2 {
  font-size: 22px;
  color: #444;
  margin-bottom: 35px;
  transition: opacity 0.4s ease;
}

/* button row */
.row {
  display: flex;
  gap: 20px;
  position: relative;
}

/* buttons */
button {
  border: none;
  padding: 14px 22px;
  border-radius: 26px;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.3s ease;
}

/* YES */
#yesBtn {
  background: #ff7aa2;
  color: white;
  transform: scale(1);
  transition: transform 1.2s ease;
}

/* NO */
#noBtn {
  background: #e6e6e6;
  color: #333;
  position: relative;
  transition: transform 0.25s ease, opacity 0.25s ease;
}

/* final state */
.final {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  text-align: center;
}

.final h1 {
  font-size: 26px;
  color: #ff7aa2;
  margin: 0;
}

.final img {
  width: 320px;
  border-radius: 18px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<div class="card">

  <h2 id="title">do you want to continue?</h2>

  <div class="row">
    <button id="yesBtn">Yes</button>
    <button id="noBtn">No</button>
  </div>

  <div class="final" id="final">
    <h1>can I see the sun smiling ☀️</h1>
    <img src="https://media.giphy.com/media/FZuC4kSIAe7MTXyHuJ/giphy.gif">
  </div>

</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const title = document.getElementById("title");
const final = document.getElementById("final");
const row = document.querySelector(".row");

let hoverCount = 0;
let started = false;

/* start only when hovering NO */
noBtn.addEventListener("mouseenter", start);

function start() {
  if (started) return;
  started = true;

  /* gentle YES growth over time */
  setInterval(() => {
    yesBtn.style.transform = `scale(${1 + hoverCount * 0.08})`;
  }, 900);

  noBtn.addEventListener("mouseenter", moveNo);
}

/* smooth, subtle escape */
function moveNo() {
  hoverCount++;

  const distance = 20 + hoverCount * 8;

  const x = (Math.random() - 0.5) * distance;
  const y = (Math.random() - 0.5) * distance;

  noBtn.style.transform = `translate(${x}px, ${y}px)`;

  /* slight fade effect as it "avoids" */
  noBtn.style.opacity = Math.max(0.4, 1 - hoverCount * 0.05);
}

/* YES progression */
yesBtn.addEventListener("click", () => {
  hoverCount++;

  if (hoverCount < 4) {
    yesBtn.innerText = ["Yes", "Definitely Yes", "100% Yes", "Of course Yes"][hoverCount];
  } else {
    document.querySelector(".row").style.display = "none";
    title.style.display = "none";
    final.style.display = "flex";
  }
});
</script>

</body>
</html>
