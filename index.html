<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sun Smile ☀️</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #ffe3f1, #fff7e6);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 360px;
  height: 640px;
  background: white;
  border-radius: 30px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
  text-align: center;
  padding: 20px;
}

h2 {
  font-size: 18px;
  margin-bottom: 30px;
  color: #444;
}

.buttons {
  position: relative;
  width: 100%;
  height: 200px;
}

button {
  border: none;
  padding: 12px 18px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s ease;
}

#yesBtn {
  background: #ff7aa2;
  color: white;
  position: relative;
  z-index: 2;
}

#noBtn {
  background: #ddd;
  position: absolute;
  top: 80px;
  left: 200px;
}

.final {
  display: none;
  font-size: 20px;
  color: #ff7aa2;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">

  <h2 id="question">do you want to continue?</h2>

  <div class="buttons">
    <button id="yesBtn" onclick="yesClick()">Yes</button>
    <button id="noBtn"
      onmouseover="runAway()"
      onmousemove="runAway()"
      ontouchstart="runAway()"
      onclick="runAway()">
      No
    </button>
  </div>

  <div class="final" id="finalMsg">
    can I see the sun smiling ☀️
  </div>

</div>

<script>
let yesStage = 0;
let speedBoost = 1;

const yesTexts = [
  "Yes",
  "Definitely Yes",
  "100% Yes",
  "Of course Yes"
];

function runAway() {
  const noBtn = document.getElementById("noBtn");

  const x = Math.random() * 220;
  const y = Math.random() * 220;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  // makes it feel more "alive" each time
  speedBoost += 0.05;
  noBtn.style.transition = `all ${0.2 / speedBoost}s ease`;
}

function yesClick() {
  const yesBtn = document.getElementById("yesBtn");
  const question = document.getElementById("question");

  yesStage++;

  if (yesStage < yesTexts.length) {
    yesBtn.innerText = yesTexts[yesStage];
    yesBtn.style.transform = "scale(" + (1 + yesStage * 0.25) + ")";
  } else {
    document.querySelector(".buttons").style.display = "none";
    question.style.display = "none";
    document.getElementById("finalMsg").style.display = "block";
  }
}
</script>

</body>
</html>
