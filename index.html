<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>can I see the sun smiling ☀️</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #fff3d6, #ffd6e7);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 540px;
  height: 420px;
  background: white;
  border-radius: 28px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.18);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
  text-align: center;
}

h2 {
  font-size: 22px;
  color: #444;
  margin-bottom: 30px;
}

.buttons {
  position: relative;
  width: 100%;
  height: 200px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
}

/* YES */
#yesBtn {
  background: #ff7aa2;
  color: white;
  border: none;
  padding: 14px 22px;
  border-radius: 26px;
  cursor: pointer;
  font-size: 15px;
  transition: transform 0.6s ease;
}

/* NO */
#noBtn {
  background: #e0e0e0;
  border: none;
  padding: 14px 22px;
  border-radius: 26px;
  cursor: pointer;
  font-size: 15px;
  position: relative;
  transition: all 0.15s ease;
}

/* Final */
.final {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 15px;
}

.final h1 {
  color: #ff7aa2;
  font-size: 26px;
}

.final img {
  width: 320px;
  border-radius: 18px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<div class="card">

  <h2 id="question">do you want to continue?</h2>

  <div class="buttons">
    <button id="yesBtn" onclick="yesClick()">Yes</button>
    <button id="noBtn"
      onmouseover="runAway(this)">
      No
    </button>
  </div>

  <div class="final" id="final">
    <h1>can I see the sun smiling ☀️</h1>
    <img src="https://media.giphy.com/media/FZuC4kSIAe7MTXyHuJ/giphy.gif">
  </div>

</div>

<script>
let yesStage = 0;
let yesScale = 1;

const yesBtn = document.getElementById("yesBtn");

const yesTexts = [
  "Yes",
  "Definitely Yes",
  "100% Yes",
  "Of course Yes"
];

/* YES slowly grows over time */
setInterval(() => {
  yesScale += 0.03;
  yesBtn.style.transform = `scale(${yesScale})`;
}, 1200);

/* NO runs away + shrinks */
function runAway(btn) {
  const card = document.querySelector(".card");

  const maxX = 400;
  const maxY = 180;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  btn.style.position = "absolute";
  btn.style.left = x + "px";
  btn.style.top = y + "px";

  btn.style.transform = "scale(0.6)";
}

/* YES progression */
function yesClick() {
  const question = document.getElementById("question");

  yesStage++;

  if (yesStage < yesTexts.length) {
    yesBtn.innerText = yesTexts[yesStage];
  } else {
    document.querySelector(".buttons").style.display = "none";
    question.style.display = "none";
    document.getElementById("final").style.display = "flex";
  }
}
</script>

</body>
</html>
